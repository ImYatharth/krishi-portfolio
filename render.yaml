databases:
  - name: krishi-strapi-db
    plan: free
    databaseName: krishi_strapi
    user: krishi

services:
  - type: web
    plan: free
    name: krishi-strapi
    runtime: node
    rootDir: apps/strapi
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: krishi-strapi-db
          property: connectionString
      - key: HOST
        value: 0.0.0.0
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://yourdomain.com
